<!DOCTYPE html>
<!-- Gargantua — co-op zero-G EVA sandbox. Entry point: DOM skeleton, importmap, styles. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GARGANTUA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Saira:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --line: rgba(255,255,255,0.18);
    --panel: rgba(0,0,0,0.7);
    --txt: #fff;
    --dim: rgba(255,255,255,0.55);
    --warn: #ff5a3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body { font-family: 'Saira', ui-monospace, monospace; color: var(--txt); }
  canvas#view { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  [hidden] { display: none !important; }

  .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }

  #error-panel {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; z-index: 100; flex-direction: column; gap: 16px; text-align: center; padding: 24px;
  }
  #error-panel h1 { font-family: 'Michroma', sans-serif; font-size: 18px; letter-spacing: 6px; }
  #error-panel p { color: var(--dim); font-size: 13px; letter-spacing: 1px; }

  #lobby {
    position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.55));
  }
  #lobby h1 {
    font-family: 'Michroma', sans-serif; font-size: clamp(32px, 7vw, 72px);
    letter-spacing: 0.35em; text-indent: 0.35em; font-weight: 400; margin-bottom: 6px;
    text-shadow: 0 0 30px rgba(255,180,90,0.25);
  }
  #lobby .sub {
    font-size: 11px; letter-spacing: 0.5em; text-indent: 0.5em; color: var(--dim);
    text-transform: uppercase; margin-bottom: 48px;
  }
  .lobby-box {
    display: flex; flex-direction: column; gap: 14px; width: 320px;
    border: 1px solid var(--line); background: var(--panel); padding: 24px;
  }
  .lobby-box label { font-size: 10px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }
  .lobby-box input {
    background: transparent; border: 1px solid var(--line); color: var(--txt);
    font-family: ui-monospace, monospace; font-size: 15px; letter-spacing: 2px;
    padding: 10px 12px; outline: none; text-transform: uppercase; width: 100%;
  }
  .lobby-box input:focus { border-color: rgba(255,255,255,0.5); }
  .btn {
    background: transparent; border: 1px solid var(--line); color: var(--txt);
    font-family: 'Saira', sans-serif; font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    padding: 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); }
  .btn.primary { background: #fff; color: #000; border-color: #fff; font-weight: 400; }
  .btn.primary:hover { background: rgba(255,255,255,0.85); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  #lobby-players { display: flex; flex-direction: column; gap: 6px; }
  .player-row { display: flex; align-items: center; gap: 10px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  .player-dot { width: 8px; height: 8px; border-radius: 50%; }
  #lobby-room-line { font-size: 11px; letter-spacing: 3px; color: var(--dim); text-transform: uppercase; }
  #lobby-room-line b { color: #fff; font-family: ui-monospace, monospace; font-size: 14px; letter-spacing: 5px; }
  #lobby-error { color: var(--warn); font-size: 11px; letter-spacing: 2px; min-height: 14px; text-transform: uppercase; }
  #lobby .foot { position: absolute; bottom: 18px; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.28); text-transform: uppercase; }

  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

  #suit-bars {
    position: absolute; left: 24px; bottom: 24px; display: flex; flex-direction: column; gap: 9px;
    background: var(--panel); border: 1px solid var(--line); padding: 14px 16px;
  }
  .bar-row { display: grid; grid-template-columns: 26px 64px 120px 52px; align-items: center; gap: 10px; }
  .bar-ico { width: 18px; height: 18px; opacity: 0.85; }
  .bar-label { font-size: 10px; letter-spacing: 2.5px; color: var(--dim); }
  .bar-track { height: 5px; background: rgba(255,255,255,0.12); position: relative; overflow: hidden; }
  .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: #fff; width: 100%; }
  .bar-row.low .bar-fill { animation: blink 0.8s steps(2) infinite; background: var(--warn); }
  .bar-row.low .bar-val { color: var(--warn); }
  @keyframes blink { 50% { opacity: 0.25; } }
  .bar-val { font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 1px; text-align: right; }

  #reticle {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #reticle-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.9); }
  #reticle-hand svg { width: 34px; height: 34px; display: block; filter: drop-shadow(0 0 4px rgba(0,0,0,0.8)); }
  #interact-prompt {
    position: absolute; left: 50%; top: calc(50% + 44px); transform: translateX(-50%);
    font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 3px;
    background: var(--panel); border: 1px solid var(--line); padding: 6px 12px; white-space: nowrap;
  }

  #toasts {
    position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .toast {
    background: var(--panel); border: 1px solid var(--line); padding: 8px 18px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap;
    animation: toastin 0.25s ease-out;
  }
  .toast.warn { color: var(--warn); border-color: rgba(255,90,60,0.5); }
  @keyframes toastin { from { opacity: 0; transform: translateY(-8px); } }

  #warn-center {
    position: absolute; left: 50%; top: 34%; transform: translateX(-50%);
    font-family: 'Michroma', sans-serif; font-size: 14px; letter-spacing: 8px; text-indent: 8px;
    color: var(--warn); text-transform: uppercase; text-align: center;
    animation: blink 1.1s steps(2) infinite; white-space: pre-line;
  }

  #suitlog {
    position: absolute; right: 24px; top: 24px; width: 300px; max-height: 70vh; overflow: hidden auto;
    background: var(--panel); border: 1px solid var(--line); padding: 16px;
  }
  #suitlog h2 { font-family: 'Michroma', sans-serif; font-size: 11px; letter-spacing: 4px; margin-bottom: 4px; }
  #suitlog .count { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 2px; color: var(--dim); margin-bottom: 12px; }
  #suitlog ul { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  #suitlog li { font-size: 11px; letter-spacing: 1.5px; border-left: 2px solid var(--line); padding-left: 8px; }
  #suitlog li .who { color: var(--dim); font-size: 9px; letter-spacing: 2px; display: block; }
  #suitlog li.undiscovered { color: rgba(255,255,255,0.25); }
  #suitlog .controls { border-top: 1px solid var(--line); padding-top: 10px; display: flex; flex-direction: column; gap: 3px; }
  #suitlog .controls div { font-size: 9px; letter-spacing: 1.5px; color: var(--dim); display: flex; justify-content: space-between; }
  #suitlog .controls span { color: #fff; font-family: ui-monospace, monospace; }

  #room-tag {
    position: absolute; right: 24px; bottom: 24px; background: var(--panel);
    border: 1px solid var(--line); padding: 8px 14px; font-family: ui-monospace, monospace;
    font-size: 11px; letter-spacing: 3px; color: var(--dim);
  }
  #room-tag b { color: #fff; }

  #vignette { position: fixed; inset: 0; z-index: 9; pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(120,0,0,0.55) 100%); }

  #pause {
    position: fixed; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.72); flex-direction: column; gap: 24px;
  }
  #pause h1 { font-family: 'Michroma', sans-serif; font-size: 22px; letter-spacing: 10px; text-indent: 10px; }
  #pause .lobby-box { width: 300px; }

  #nameplates { position: fixed; inset: 0; z-index: 8; pointer-events: none; overflow: hidden; }
  .nameplate {
    position: absolute; transform: translate(-50%,-100%);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    background: rgba(0,0,0,0.55); border: 1px solid var(--line); padding: 3px 8px; white-space: nowrap;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="view"></canvas>
<div id="nameplates"></div>
<div id="vignette"></div>

<div id="hud" hidden>
  <div id="suit-bars"></div>
  <div id="reticle">
    <div id="reticle-dot"></div>
    <div id="reticle-hand" hidden></div>
  </div>
  <div id="interact-prompt" hidden></div>
  <div id="toasts"></div>
  <div id="warn-center" hidden></div>
  <div id="suitlog" hidden></div>
  <div id="room-tag" hidden></div>
</div>

<div id="lobby">
  <h1>GARGANTUA</h1>
  <div class="sub">Zero-G EVA · Deep Field Station</div>
  <div class="lobby-box" id="lobby-main">
    <label for="lobby-name">Callsign</label>
    <input id="lobby-name" maxlength="12" placeholder="ASTRONAUT" autocomplete="off">
    <div class="row">
      <button class="btn" id="btn-create">Create Room</button>
      <button class="btn" id="btn-solo">Solo EVA</button>
    </div>
    <label for="lobby-code">Or join with code</label>
    <div class="row">
      <input id="lobby-code" maxlength="4" placeholder="CODE" autocomplete="off">
      <button class="btn" id="btn-join">Join</button>
    </div>
    <div id="lobby-error"></div>
  </div>
  <div class="lobby-box" id="lobby-room" hidden>
    <div id="lobby-room-line">Room <b id="lobby-room-code">----</b></div>
    <div id="lobby-players"></div>
    <button class="btn primary" id="btn-enter">Enter EVA</button>
    <button class="btn" id="btn-leave">Leave</button>
  </div>
  <div class="foot">WASD + Mouse · LMB Grab · Space Push-off · Shift RCS · Kenney CC0 Assets</div>
</div>

<div id="pause" hidden>
  <h1>PAUSED</h1>
  <div class="lobby-box">
    <div id="pause-room-line" class="mono" style="font-size:12px;letter-spacing:3px;color:var(--dim)"></div>
    <button class="btn primary" id="btn-resume">Resume</button>
    <button class="btn" id="btn-copy-code" hidden>Copy Room Code</button>
    <label>Volume</label>
    <input id="vol-slider" type="range" min="0" max="100" value="70" style="width:100%">
    <button class="btn" id="btn-exit">Exit To Lobby</button>
  </div>
</div>

<div id="error-panel" hidden>
  <h1>GARGANTUA</h1>
  <p id="error-text">CDN UNREACHABLE — CHECK CONNECTION AND RELOAD</p>
</div>

<script type="module" src="src/main.js?v=1"></script>
<script>
  window.addEventListener('error', (e) => {
    if (!window.__gargantuaBooted && e.message && /import|module|fetch/i.test(e.message)) {
      document.getElementById('error-panel').hidden = false;
    }
  });
</script>
</body>
</html>
